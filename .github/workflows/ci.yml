name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BINSTALL_DISABLE_TELEMETRY: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install rustfmt
        run: |
          rustup update stable
          rustup component add rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Clippy
        run: |
          rustup update stable
          rustup component add clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  docs:
    name: Docs
    runs-on: ubuntu-latest

    env:
      # Fail the build on any rustdoc warning (broken links, bad HTML, etc).
      # These are emitted by rustdoc, not clippy, so they need their own step.
      RUSTDOCFLAGS: -D warnings

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        run: rustup update stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build documentation
        run: cargo doc --workspace --all-features --no-deps --locked

  test:
    name: Test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        run: rustup update stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build
        run: cargo build --workspace --all-features --locked

      - name: Test
        run: cargo test --workspace --all-features --locked

  miri:
    name: Miri
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Miri
        run: rustup toolchain install nightly --profile minimal --component miri

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Set up Miri
        run: cargo +nightly miri setup

      - name: Run tests under Miri
        run: cargo +nightly miri test --workspace --all-features --locked

  no-default-features:
    name: No default features
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        run: rustup update stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check without default features
        run: cargo check --workspace --no-default-features --locked

  msrv:
    name: MSRV
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust 1.85.0
        run: rustup toolchain install 1.85.0 --profile minimal

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build with the minimum supported Rust version
        run: cargo +1.85.0 build --workspace --all-features --locked

  c-abi:
    name: C ABI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        run: rustup update stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.20.1
        with:
          version: "1.20.1"

      - name: Install cbindgen and just
        run: cargo binstall --no-confirm --force cbindgen just

      - name: Generate C header
        run: just header

      - name: Check generated header is committed
        run: just check-header

      - name: Build FFI crate
        run: cargo build -p profcast-ffi --release --locked
